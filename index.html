<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pantry Club · Daily Intelligence</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F0F4F8}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:#F1F5F9}
  ::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useCallback } = React;

/* ─── Icons ──────────────────────────────────────────────────────── */
const Ico = ({children,size=16,color="currentColor",fill="none"}) =>
  <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>{children}</svg>;

const DownloadIcon = ({size,color}) => <Ico size={size} color={color}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Ico>;
const ChevUp       = ({size,color}) => <Ico size={size} color={color}><polyline points="18 15 12 9 6 15"/></Ico>;
const ChevDown     = ({size,color}) => <Ico size={size} color={color}><polyline points="6 9 12 15 18 9"/></Ico>;
const DollarIcon   = ({size,color}) => <Ico size={size} color={color}><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></Ico>;
const PackageIcon  = ({size,color}) => <Ico size={size} color={color}><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></Ico>;
const CartIcon     = ({size,color}) => <Ico size={size} color={color}><circle cx="9" cy="21" r="1" fill={color}/><circle cx="20" cy="21" r="1" fill={color}/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></Ico>;
const ArchiveIcon  = ({size,color}) => <Ico size={size} color={color}><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></Ico>;
const RefreshIcon  = ({size,color}) => <Ico size={size} color={color}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></Ico>;

/* ─── Password ────────────────────────────────────────────────────────
   Change PASSWORD below to update the access code, then re-upload index.html.
   ──────────────────────────────────────────────────────────────────── */
const PASSWORD     = "pantry2026";   // ← change this
const SESSION_KEY  = "pc_auth_exp";
const SESSION_DAYS = 7;

const isSessionValid = () => {
  try { const e=localStorage.getItem(SESSION_KEY); return e&&Date.now()<parseInt(e,10); }
  catch { return false; }
};
const saveSession = () => {
  try { localStorage.setItem(SESSION_KEY,(Date.now()+SESSION_DAYS*864e5).toString()); }
  catch {}
};

/* ─── Config ──────────────────────────────────────────────────────── */
const C = {
  navy:"#0F2044", teal:"#0D9488",
  bg:"#F0F4F8", card:"#FFFFFF", border:"#E2E8F0",
  text:"#1E293B", muted:"#64748B", faint:"#94A3B8",
  pos:"#16A34A", neg:"#DC2626", stripe:"#F8FAFC",
};
const D2E = new Set(["Tiger Trolley","Adcock Shop","RCL Shop","Clover","Pepsico","Pepsico Partners","Godrej","Futurelife","Sondla","Lucky Star Foods","Purity Shop","Jungle Oats","SiyaStocka"]);
const PERIODS = [{key:"day",label:"Yesterday"},{key:"week",label:"Last 7 Days"},{key:"mtd",label:"MTD"},{key:"ytd",label:"YTD"}];
const FMT_R='"R"#,##0', FMT_R2='"R"#,##0.00', FMT_N="#,##0", FMT_PCT='0.0%;-0.0%;"-"';

// ★ These are the ONLY filenames that need to be uploaded to GitHub each morning
const CSV = { total:"total.csv", site:"channels.csv", items:"items.csv" };

/* ─── Helpers ─────────────────────────────────────────────────────── */
const gPct   = (ty,ly) => (ly&&ly!==0?((ty-ly)/Math.abs(ly))*100:null);
const fmtR   = (n) => n==null?"—":`R${Math.round(n).toLocaleString("en-US")}`;
const fmtN   = (n) => n==null?"—":Math.round(n).toLocaleString("en-US");
const fmtPct = (n) => n===null?"—":`${n>=0?"+":""}${n.toFixed(1)}%`;
const pColor = (n) => n===null?C.faint:n>0?C.pos:n<0?C.neg:C.faint;
const applyFmt=(ws,cell,fmt)=>{ if(ws[cell]) ws[cell].z=fmt; };
const applyFmtRange=(ws,cols,sr,er,fmt)=>{ for(let r=sr;r<=er;r++) cols.forEach(c=>applyFmt(ws,`${c}${r}`,fmt)); };

/* ─── App ─────────────────────────────────────────────────────────── */

/* ─── Password screen ─────────────────────────────────────────────────
   Change PASSWORD at the top of this file to update the access code.
   Users are remembered for 7 days so Mark only types it once a week.
   ──────────────────────────────────────────────────────────────────── */
function LoginScreen({onSuccess}) {
  const [pw,  setPw]  = useState("");
  const [err, setErr] = useState(false);
  const [shake, setShake] = useState(false);

  const attempt = () => {
    if(pw === PASSWORD) { saveSession(); onSuccess(); }
    else {
      setErr(true); setShake(true); setPw("");
      setTimeout(()=>setShake(false), 450);
    }
  };

  return (
    <div style={{minHeight:"100vh",background:C.navy,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"2rem"}}>
      <div style={{marginBottom:"2rem",textAlign:"center"}}>
        <div style={{fontSize:"0.62rem",letterSpacing:"0.2em",color:C.teal,fontWeight:700,textTransform:"uppercase",marginBottom:"0.6rem"}}>CAS Digital</div>
        <div style={{fontSize:"1.7rem",fontWeight:800,color:"#FFF",letterSpacing:"-0.02em"}}>Pantry Club</div>
        <div style={{fontSize:"0.85rem",color:"#94A3B8",marginTop:"0.3rem"}}>Daily Intelligence Report</div>
      </div>
      <div style={{
        background:"rgba(255,255,255,0.05)",border:`1.5px solid ${err?"#EF4444":"rgba(255,255,255,0.12)"}`,
        borderRadius:"14px",padding:"2rem",width:"100%",maxWidth:"320px",
        transition:"border-color 0.2s",
        animation:shake?"shake 0.4s ease":"none",
      }}>
        <label style={{fontSize:"0.7rem",fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:"0.1em",display:"block",marginBottom:"0.5rem"}}>
          Access code
        </label>
        <input
          type="password"
          value={pw}
          onChange={e=>{setPw(e.target.value);setErr(false);}}
          onKeyDown={e=>e.key==="Enter"&&attempt()}
          placeholder="Enter password"
          autoFocus
          style={{
            width:"100%",padding:"0.72rem 1rem",borderRadius:"8px",fontSize:"1rem",
            border:`1.5px solid ${err?"#EF4444":"rgba(255,255,255,0.18)"}`,
            background:"rgba(255,255,255,0.07)",color:"#FFF",outline:"none",
            marginBottom:err?"0.5rem":"0.9rem",letterSpacing:"0.12em",
            transition:"border-color 0.2s",
          }}
        />
        {err&&<div style={{fontSize:"0.75rem",color:"#FCA5A5",marginBottom:"0.75rem",textAlign:"center"}}>Incorrect password — try again</div>}
        <button
          onClick={attempt}
          style={{width:"100%",padding:"0.72rem",borderRadius:"8px",border:"none",cursor:"pointer",
            fontWeight:700,fontSize:"0.85rem",background:C.teal,color:"#FFF",letterSpacing:"0.03em"}}
        >
          Access report
        </button>
      </div>
      <div style={{marginTop:"1.5rem",fontSize:"0.68rem",color:"rgba(255,255,255,0.18)",textAlign:"center"}}>
        Authorised users only &middot; CAS Digital &copy; {new Date().getFullYear()}
      </div>
      <style>{`@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}50%{transform:translateX(8px)}75%{transform:translateX(-5px)}}`}</style>
    </div>
  );
}

function App() {
  const [authed,    setAuthed]    = useState(isSessionValid);
  const [data,      setData]      = useState({total:null,site:null,items:null});
  const [status,    setStatus]    = useState("loading");  // loading | ready | error
  const [period,    setPeriod]    = useState("day");
  const [sort,      setSort]      = useState({key:"rev_ty",dir:"desc"});
  const [exporting, setExporting] = useState(false);

  // Gate: show login until authenticated
  if(!authed) return <LoginScreen onSuccess={()=>setAuthed(true)}/>;

  /* ── Fetch CSVs from relative paths (works on GitHub Pages) ─────── */
  useEffect(()=>{
    let loaded = 0;
    const detect = fields => {
      if(fields.includes("stock_value_jhb_this_year")) return "total";
      if(fields.includes("site_name"))                 return "site";
      if(fields.includes("product_id"))                return "items";
      return null;
    };
    Promise.allSettled(
      Object.entries(CSV).map(([type, filename]) =>
        fetch(`${filename}?v=${Date.now()}`, {cache:"no-store"})
          .then(r=>{ if(!r.ok) throw new Error(`${filename} not found`); return r.text(); })
          .then(text=>new Promise(resolve=>{
            Papa.parse(text,{header:true,dynamicTyping:true,skipEmptyLines:true,
              complete:({data:rows,meta})=>{
                const t=detect(meta.fields||[])||type;
                setData(p=>({...p,[t]:rows}));
                loaded++;
                resolve();
              }
            });
          }))
      )
    ).then(()=>{ setStatus(loaded>=2?"ready":"error"); });
  },[]);

  /* ─── Date logic ─────────────────────────────────────────────────── */
  const lastDay = useMemo(()=>{
    if(!data.total) return null;
    const today=new Date().toISOString().split("T")[0];
    return data.total.filter(r=>(r.revenue_this_year||0)>10000&&r.date<today).map(r=>r.date).sort().reverse()[0]||null;
  },[data.total]);

  const dates = useMemo(()=>{
    if(!lastDay||!data.total) return [];
    const end=new Date(lastDay+"T12:00:00"),yr=end.getFullYear(),mo=end.getMonth();
    if(period==="day")  return [lastDay];
    if(period==="week") return Array.from({length:7},(_,i)=>{ const d=new Date(end); d.setDate(d.getDate()-i); return d.toISOString().split("T")[0]; });
    if(period==="mtd")  return data.total.filter(r=>{ const d=new Date(r.date+"T12:00:00"); return d.getFullYear()===yr&&d.getMonth()===mo&&r.date<=lastDay&&(r.revenue_this_year||0)>0; }).map(r=>r.date);
    if(period==="ytd")  return data.total.filter(r=>{ const d=new Date(r.date+"T12:00:00"); return d.getFullYear()===yr&&r.date<=lastDay&&(r.revenue_this_year||0)>0; }).map(r=>r.date);
    return [];
  },[lastDay,period,data.total]);

  const periodLabel = useMemo(()=>{
    if(!lastDay) return "";
    const end=new Date(lastDay+"T12:00:00");
    const s=d=>d.toLocaleDateString("en-ZA",{day:"numeric",month:"short"});
    if(period==="day")  return end.toLocaleDateString("en-ZA",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
    if(period==="week") { const f=new Date(end); f.setDate(f.getDate()-6); return `${s(f)} – ${s(end)} ${end.getFullYear()} · Last 7 Days`; }
    if(period==="mtd")  { const f=new Date(end.getFullYear(),end.getMonth(),1); return `${end.toLocaleDateString("en-ZA",{month:"long",year:"numeric"})} · Month to Date (${s(f)} – ${s(end)})`; }
    if(period==="ytd")  { const j=new Date(end.getFullYear(),0,1); return `${end.getFullYear()} Year to Date · ${s(j)} – ${end.toLocaleDateString("en-ZA",{day:"numeric",month:"long",year:"numeric"})}`; }
    return "";
  },[lastDay,period]);

  const kpis = useMemo(()=>{
    if(!data.total||!dates.length) return null;
    const rows=data.total.filter(r=>dates.includes(r.date));
    const S=k=>rows.reduce((a,r)=>a+(r[k]||0),0);
    const snap=data.total.find(r=>r.date===lastDay)||{};
    return {
      rev_ty:S("revenue_this_year"),rev_ly:S("revenue_last_year"),
      ord_ty:S("orders_this_year"),ord_ly:S("orders_last_year"),
      stock_ty:snap.stock_value_total_this_year||0,stock_ly:snap.stock_value_total_last_year||0,
      jhb:snap.stock_value_jhb_this_year||0,dbn:snap.stock_value_dbn_this_year||0,cpt:snap.stock_value_cpt_this_year||0,
    };
  },[data.total,dates,lastDay]);

  const units = useMemo(()=>{
    if(!data.items||!dates.length) return {ty:0,ly:0};
    const rows=data.items.filter(r=>dates.includes(r.date));
    return {ty:rows.reduce((a,r)=>a+(r.units_sold_this_year||0),0),ly:rows.reduce((a,r)=>a+(r.units_sold_last_year||0),0)};
  },[data.items,dates]);

  const channels = useMemo(()=>{
    if(!data.site||!dates.length) return {rows:[],d2eSub:null,d2cSub:null};
    const rows=data.site.filter(r=>dates.includes(r.date)),map={};
    rows.forEach(r=>{
      if(!map[r.site_name]) map[r.site_name]={site:r.site_name,rev_ty:0,rev_ly:0,ord_ty:0,ord_ly:0,isD2E:D2E.has(r.site_name)};
      map[r.site_name].rev_ty+=r.revenue_this_year||0; map[r.site_name].rev_ly+=r.revenue_last_year||0;
      map[r.site_name].ord_ty+=r.orders_this_year||0;  map[r.site_name].ord_ly+=r.orders_last_year||0;
    });
    const all=Object.values(map).sort((a,b)=>b.rev_ty-a.rev_ty);
    const sub=arr=>arr.reduce((a,r)=>({rev_ty:a.rev_ty+r.rev_ty,rev_ly:a.rev_ly+r.rev_ly,ord_ty:a.ord_ty+r.ord_ty,ord_ly:a.ord_ly+r.ord_ly}),{rev_ty:0,rev_ly:0,ord_ty:0,ord_ly:0});
    return {rows:all,d2eSub:sub(all.filter(r=>r.isD2E)),d2cSub:sub(all.filter(r=>!r.isD2E))};
  },[data.site,dates]);

  const items = useMemo(()=>{
    if(!data.items||!dates.length) return [];
    const rows=data.items.filter(r=>dates.includes(r.date)),map={};
    rows.forEach(r=>{
      if(!map[r.product_id]) map[r.product_id]={id:r.product_id,name:r.product_name,brand:r.brand,rev_ty:0,rev_ly:0,units_ty:0,units_ly:0};
      map[r.product_id].rev_ty+=r.revenue_this_year||0; map[r.product_id].rev_ly+=r.revenue_last_year||0;
      map[r.product_id].units_ty+=r.units_sold_this_year||0; map[r.product_id].units_ly+=r.units_sold_last_year||0;
    });
    return Object.values(map)
      .map(r=>({...r,rev_pct:gPct(r.rev_ty,r.rev_ly),units_pct:gPct(r.units_ty,r.units_ly)}))
      .sort((a,b)=>sort.dir==="desc"?(b[sort.key]??-Infinity)-(a[sort.key]??-Infinity):(a[sort.key]??-Infinity)-(b[sort.key]??-Infinity));
  },[data.items,dates,sort]);

  const toggleSort = key=>setSort(s=>({key,dir:s.key===key&&s.dir==="desc"?"asc":"desc"}));
  const aov_ty=kpis?.ord_ty?kpis.rev_ty/kpis.ord_ty:0;
  const aov_ly=kpis?.ord_ly?kpis.rev_ly/kpis.ord_ly:0;

  /* ── Excel export ─────────────────────────────────────────────────── */
  const exportExcel = useCallback(()=>{
    if(!kpis) return;
    setExporting(true);
    try {
      const wb=XLSX.utils.book_new();
      const ds=new Date().toISOString().split("T")[0];
      const pt={day:"Daily",week:"7Day",mtd:"MTD",ytd:"YTD"}[period];
      const pD=n=>n===null?null:n/100;
      const gd=new Date().toLocaleDateString("en-ZA",{weekday:"long",day:"numeric",month:"long",year:"numeric"});

      const s1=[
        ["PANTRY CLUB DAILY INTELLIGENCE REPORT"],[periodLabel],[`Generated: ${gd}`],[""],
        ["BUSINESS PERFORMANCE SUMMARY"],
        ["Metric","This Year","Last Year","vs Last Year"],
        ["Sales Revenue",kpis.rev_ty,kpis.rev_ly,pD(gPct(kpis.rev_ty,kpis.rev_ly))],
        ["Number of Orders",kpis.ord_ty,kpis.ord_ly,pD(gPct(kpis.ord_ty,kpis.ord_ly))],
        ["Average Order Value (AOV)",aov_ty,aov_ly,pD(gPct(aov_ty,aov_ly))],
        ["Units Sold *",units.ty,units.ly,pD(gPct(units.ty,units.ly))],[""],
        ["STOCK HOLDINGS (Latest Warehouse Snapshot)"],
        ["Location","Value TY (ZAR)","Value LY (ZAR)","vs Last Year"],
        ["Total — All DCs",kpis.stock_ty,kpis.stock_ly,pD(gPct(kpis.stock_ty,kpis.stock_ly))],
        ["Johannesburg (JHB)",kpis.jhb,null,null],["Durban (DBN)",kpis.dbn,null,null],["Cape Town (CPT)",kpis.cpt,null,null],[""],
        ["* Units reflect top 100 SKUs only (~28.5% of total revenue)."],
      ];
      const ws1=XLSX.utils.aoa_to_sheet(s1);
      ws1["!cols"]=[{wch:34},{wch:20},{wch:20},{wch:16}];
      applyFmtRange(ws1,["B","C"],7,9,FMT_R2); applyFmtRange(ws1,["D"],7,10,FMT_PCT);
      applyFmt(ws1,"B8",FMT_N);applyFmt(ws1,"C8",FMT_N);applyFmt(ws1,"B10",FMT_N);applyFmt(ws1,"C10",FMT_N);
      applyFmtRange(ws1,["B","C"],14,17,FMT_R);applyFmt(ws1,"D14",FMT_PCT);
      XLSX.utils.book_append_sheet(wb,ws1,"Summary");

      const cR=[
        [`CHANNEL PERFORMANCE — ${periodLabel}`],[""],
        ["Segment","Channel","Revenue TY","Revenue LY","Rev vs LY","Orders TY","Orders LY","Ord vs LY","AOV TY","AOV LY"],
        ["TOTAL","ALL CHANNELS",kpis.rev_ty,kpis.rev_ly,pD(gPct(kpis.rev_ty,kpis.rev_ly)),kpis.ord_ty,kpis.ord_ly,pD(gPct(kpis.ord_ty,kpis.ord_ly)),aov_ty,aov_ly],
        [""],["","— D2E EMPLOYEE SHOPS —","","","","","","","",""],
      ];
      channels.rows.filter(r=>r.isD2E).forEach(r=>{const a=r.ord_ty?r.rev_ty/r.ord_ty:0,al=r.ord_ly?r.rev_ly/r.ord_ly:0;cR.push(["D2E",r.site,r.rev_ty,r.rev_ly,pD(gPct(r.rev_ty,r.rev_ly)),r.ord_ty,r.ord_ly,pD(gPct(r.ord_ty,r.ord_ly)),a,al]);});
      if(channels.d2eSub){const a=channels.d2eSub.ord_ty?channels.d2eSub.rev_ty/channels.d2eSub.ord_ty:0,al=channels.d2eSub.ord_ly?channels.d2eSub.rev_ly/channels.d2eSub.ord_ly:0;cR.push(["D2E","D2E SUBTOTAL",channels.d2eSub.rev_ty,channels.d2eSub.rev_ly,pD(gPct(channels.d2eSub.rev_ty,channels.d2eSub.rev_ly)),channels.d2eSub.ord_ty,channels.d2eSub.ord_ly,pD(gPct(channels.d2eSub.ord_ty,channels.d2eSub.ord_ly)),a,al]);}
      cR.push([""]);cR.push(["","— D2C CONSUMER (GROCERY CLUB) —","","","","","","","",""]);
      channels.rows.filter(r=>!r.isD2E).forEach(r=>{const a=r.ord_ty?r.rev_ty/r.ord_ty:0,al=r.ord_ly?r.rev_ly/r.ord_ly:0;cR.push(["D2C",r.site,r.rev_ty,r.rev_ly,pD(gPct(r.rev_ty,r.rev_ly)),r.ord_ty,r.ord_ly,pD(gPct(r.ord_ty,r.ord_ly)),a,al]);});
      if(channels.d2cSub){const a=channels.d2cSub.ord_ty?channels.d2cSub.rev_ty/channels.d2cSub.ord_ty:0,al=channels.d2cSub.ord_ly?channels.d2cSub.rev_ly/channels.d2cSub.ord_ly:0;cR.push(["D2C","D2C SUBTOTAL",channels.d2cSub.rev_ty,channels.d2cSub.rev_ly,pD(gPct(channels.d2cSub.rev_ty,channels.d2cSub.rev_ly)),channels.d2cSub.ord_ty,channels.d2cSub.ord_ly,pD(gPct(channels.d2cSub.ord_ty,channels.d2cSub.ord_ly)),a,al]);}
      const ws2=XLSX.utils.aoa_to_sheet(cR);
      ws2["!cols"]=[{wch:9},{wch:26},{wch:16},{wch:16},{wch:12},{wch:12},{wch:12},{wch:12},{wch:14},{wch:14}];
      ws2["!freeze"]={xSplit:0,ySplit:3};
      applyFmtRange(ws2,["C","D"],4,cR.length,FMT_R);applyFmtRange(ws2,["E"],4,cR.length,FMT_PCT);
      applyFmtRange(ws2,["F","G"],4,cR.length,FMT_N);applyFmtRange(ws2,["H"],4,cR.length,FMT_PCT);
      applyFmtRange(ws2,["I","J"],4,cR.length,FMT_R2);
      XLSX.utils.book_append_sheet(wb,ws2,"By Channel");

      const iR=[[`TOP 100 ITEMS — ${periodLabel}`],[""],["Rank","Product","Brand","Revenue TY","Revenue LY","Rev vs LY","Units TY","Units LY","Units vs LY"]];
      items.forEach((item,idx)=>iR.push([idx+1,item.name,item.brand,item.rev_ty,item.rev_ly,pD(item.rev_pct),item.units_ty,item.units_ly,pD(item.units_pct)]));
      const ws3=XLSX.utils.aoa_to_sheet(iR);
      ws3["!cols"]=[{wch:6},{wch:44},{wch:18},{wch:14},{wch:14},{wch:12},{wch:12},{wch:12},{wch:12}];
      ws3["!freeze"]={xSplit:0,ySplit:3};
      applyFmtRange(ws3,["D","E"],4,iR.length,FMT_R);applyFmtRange(ws3,["F"],4,iR.length,FMT_PCT);
      applyFmtRange(ws3,["G","H"],4,iR.length,FMT_N);applyFmtRange(ws3,["I"],4,iR.length,FMT_PCT);
      XLSX.utils.book_append_sheet(wb,ws3,"Top 100 Items");
      XLSX.writeFile(wb,`PantryClub_${pt}_${ds}.xlsx`);
    } finally { setExporting(false); }
  },[kpis,channels,items,units,period,periodLabel,aov_ty,aov_ly]);

  /* ─── Loading screen ─────────────────────────────────────────────── */
  if(status==="loading") return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"1.5rem"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:"0.62rem",letterSpacing:"0.15em",color:C.teal,fontWeight:700,textTransform:"uppercase",marginBottom:"0.5rem"}}>CAS Digital · Pantry Club</div>
        <div style={{fontSize:"1.2rem",fontWeight:800,color:C.navy}}>Daily Intelligence Report</div>
      </div>
      <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
        {[0,1,2].map(i=><div key={i} style={{width:"10px",height:"10px",borderRadius:"50%",background:C.teal,animation:`pulse 1.2s ease-in-out ${i*0.2}s infinite`}}/>)}
      </div>
      <div style={{fontSize:"0.8rem",color:C.muted}}>Loading today's data…</div>
    </div>
  );

  /* ─── Error screen (files not found) ────────────────────────────── */
  if(status==="error") return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"1rem",padding:"2rem"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:"0.62rem",letterSpacing:"0.15em",color:C.teal,fontWeight:700,textTransform:"uppercase",marginBottom:"0.5rem"}}>CAS Digital · Pantry Club</div>
        <div style={{fontSize:"1.2rem",fontWeight:800,color:C.navy,marginBottom:"0.5rem"}}>Daily Intelligence Report</div>
      </div>
      <div style={{background:"#FFF",border:`1px solid ${C.border}`,borderRadius:"12px",padding:"2rem 2.5rem",textAlign:"center",maxWidth:"440px"}}>
        <div style={{fontSize:"2rem",marginBottom:"0.75rem"}}>📊</div>
        <div style={{fontWeight:700,color:C.navy,fontSize:"0.95rem",marginBottom:"0.5rem"}}>Today's data is being prepared</div>
        <div style={{fontSize:"0.82rem",color:C.muted,lineHeight:1.6}}>The report will be available shortly. Please check back in a few minutes or refresh the page.</div>
        <button onClick={()=>window.location.reload()} style={{marginTop:"1.25rem",padding:"0.5rem 1.25rem",borderRadius:"8px",border:"none",background:C.teal,color:"#FFF",fontWeight:700,fontSize:"0.8rem",cursor:"pointer",display:"inline-flex",alignItems:"center",gap:"6px"}}>
          <RefreshIcon size={13} color="#FFF"/> Refresh
        </button>
      </div>
    </div>
  );

  /* ─── Sub-components ─────────────────────────────────────────────── */
  const KpiCard = ({label,ty,ly,Icon:Ic,sub,note,fmt="currency"}) => {
    const p=gPct(ty,ly),col=pColor(p),disp=fmt==="currency"?fmtR:fmtN;
    return (
      <div style={{flex:1,minWidth:"190px",background:C.card,padding:"1rem 1.2rem",borderTop:`3px solid ${col}`,border:`1px solid ${C.border}`,borderTopWidth:"3px",borderRadius:"0 0 8px 8px"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:"0.55rem"}}>
          <span style={{fontSize:"0.62rem",fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em"}}>{label}</span>
          <Ic size={14} color={C.faint}/>
        </div>
        <div style={{fontSize:"1.55rem",fontWeight:800,color:C.text,lineHeight:1}}>{disp(ty)}</div>
        {sub&&<div style={{fontSize:"0.72rem",color:C.muted,marginTop:"0.2rem"}}>{sub}</div>}
        <div style={{marginTop:"0.4rem",display:"flex",gap:"0.4rem",alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:"0.72rem",color:C.muted}}>vs {disp(ly)} LY</span>
          <span style={{fontSize:"0.77rem",fontWeight:700,color:col}}>{fmtPct(p)}</span>
        </div>
        {note&&<div style={{fontSize:"0.62rem",color:C.faint,marginTop:"0.25rem"}}>{note}</div>}
      </div>
    );
  };

  const CRow = ({row,variant="normal"}) => {
    const rp=gPct(row.rev_ty,row.rev_ly),op=gPct(row.ord_ty,row.ord_ly);
    const isT=variant==="total",isS=variant==="sub";
    const bg=isT?C.navy:isS?"#EEF2F7":"transparent";
    const tc=isT?"#FFF":C.text,mc=isT?"#94A3B8":C.muted,fw=isT||isS?700:400;
    const gc=p=>p===null?mc:p>0?(isT?"#86EFAC":C.pos):(isT?"#FCA5A5":C.neg);
    return (
      <tr style={{background:bg,borderBottom:`1px solid ${isT?"rgba(255,255,255,0.08)":C.border}`}}>
        <td style={{padding:"0.52rem 1rem",fontSize:"0.78rem",color:tc,fontWeight:fw}}>
          {variant==="normal"&&<span style={{fontSize:"0.58rem",padding:"2px 5px",borderRadius:"8px",background:row.isD2E?"#EFF6FF":"#F0FDF4",color:row.isD2E?"#2563EB":"#16A34A",fontWeight:700,marginRight:"0.45rem"}}>{row.isD2E?"D2E":"D2C"}</span>}
          {row.site}
        </td>
        <td style={{padding:"0.52rem 0.75rem",textAlign:"right",fontSize:"0.78rem",color:tc,fontWeight:fw}}>{fmtR(row.rev_ty)}</td>
        <td style={{padding:"0.52rem 0.75rem",textAlign:"right",fontSize:"0.75rem",color:mc}}>{fmtR(row.rev_ly)}</td>
        <td style={{padding:"0.52rem 0.75rem",textAlign:"right",fontSize:"0.78rem",fontWeight:700,color:gc(rp)}}>{fmtPct(rp)}</td>
        <td style={{padding:"0.52rem 0.75rem",textAlign:"right",fontSize:"0.78rem",color:tc,fontWeight:fw}}>{fmtN(row.ord_ty)}</td>
        <td style={{padding:"0.52rem 0.75rem",textAlign:"right",fontSize:"0.75rem",color:mc}}>{fmtN(row.ord_ly)}</td>
        <td style={{padding:"0.52rem 0.75rem",textAlign:"right",fontSize:"0.78rem",fontWeight:700,color:gc(op)}}>{fmtPct(op)}</td>
      </tr>
    );
  };

  const SortCaret=({k})=>sort.key===k?(sort.dir==="desc"?<ChevDown size={11} color={C.teal}/>:<ChevUp size={11} color={C.teal}/>):<ChevUp size={11} color={C.faint}/>;

  const TH=({label,k,align="right"})=>(
    <th onClick={()=>k&&toggleSort(k)} style={{padding:"0.52rem 0.75rem",textAlign:align,fontSize:"0.62rem",fontWeight:700,color:sort.key===k?C.teal:C.muted,textTransform:"uppercase",letterSpacing:"0.05em",cursor:k?"pointer":"default",userSelect:"none",whiteSpace:"nowrap",background:"#F8FAFC"}}>
      <span style={{display:"flex",alignItems:"center",justifyContent:align==="left"?"flex-start":"flex-end",gap:"2px"}}>{label}{k&&<SortCaret k={k}/>}</span>
    </th>
  );

  const d2eRows=channels.rows.filter(r=>r.isD2E), d2cRows=channels.rows.filter(r=>!r.isD2E);

  /* ─── Dashboard ──────────────────────────────────────────────────── */
  return (
    <div style={{minHeight:"100vh",background:C.bg}}>

      {/* Header */}
      <div style={{background:C.navy,padding:"0.9rem 1.75rem",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:"0.75rem"}}>
        <div>
          <div style={{fontSize:"0.58rem",letterSpacing:"0.15em",color:C.teal,fontWeight:700,textTransform:"uppercase"}}>CAS Digital · Pantry Club</div>
          <div style={{fontSize:"1.1rem",fontWeight:800,color:"#FFF",marginTop:"2px"}}>Daily Intelligence Report</div>
          <div style={{fontSize:"0.7rem",color:"#94A3B8",marginTop:"2px"}}>{periodLabel}</div>
        </div>
        <div style={{display:"flex",gap:"0.5rem",alignItems:"center",flexWrap:"wrap"}}>
          <div style={{display:"flex",background:"rgba(255,255,255,0.08)",borderRadius:"8px",padding:"3px"}}>
            {PERIODS.map(({key,label})=>(
              <button key={key} onClick={()=>setPeriod(key)} style={{padding:"0.3rem 0.75rem",borderRadius:"6px",border:"none",cursor:"pointer",fontWeight:700,fontSize:"0.72rem",background:period===key?C.teal:"transparent",color:period===key?"#FFF":"#94A3B8",transition:"all 0.15s"}}>
                {label}
              </button>
            ))}
          </div>
          <button onClick={exportExcel} disabled={!kpis||exporting} style={{padding:"0.38rem 0.9rem",borderRadius:"6px",border:"none",cursor:kpis?"pointer":"not-allowed",fontWeight:700,fontSize:"0.75rem",background:kpis?"#16A34A":"rgba(255,255,255,0.1)",color:"#FFF",display:"flex",alignItems:"center",gap:"5px",opacity:kpis?1:0.5}}>
            <DownloadIcon size={13} color="#FFF"/>{exporting?"Exporting…":"Export Excel"}
          </button>
        </div>
      </div>

      <div style={{padding:"1.25rem 1.75rem",maxWidth:"1400px",margin:"0 auto"}}>

        {/* KPIs */}
        <div style={{fontSize:"0.62rem",fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"0.6rem"}}>
          Business Performance
          {(period==="mtd"||period==="ytd")&&<span style={{marginLeft:"0.75rem",fontSize:"0.6rem",color:C.teal,textTransform:"none",letterSpacing:0}}>· Cumulative totals for period</span>}
        </div>
        <div style={{display:"flex",gap:"0.85rem",flexWrap:"wrap",marginBottom:"0.85rem"}}>
          {kpis&&<>
            <KpiCard label="Sales Revenue" ty={kpis.rev_ty} ly={kpis.rev_ly} Icon={DollarIcon}  fmt="currency"/>
            <KpiCard label="Units Sold"    ty={units.ty}    ly={units.ly}    Icon={PackageIcon} fmt="number" note="⚑ Top 100 SKUs · ~28% of total revenue"/>
            <KpiCard label="Orders"        ty={kpis.ord_ty} ly={kpis.ord_ly} Icon={CartIcon}    fmt="number" sub={`AOV: ${fmtR(aov_ty)}  ·  LY: ${fmtR(aov_ly)}`}/>
            <KpiCard label="Stock Value"   ty={kpis.stock_ty} ly={kpis.stock_ly} Icon={ArchiveIcon} fmt="currency" note="Warehouse snapshot — latest available"/>
          </>}
        </div>

        {/* Stock DC bars */}
        {kpis&&kpis.stock_ty>0&&(
          <div style={{background:C.card,borderRadius:"8px",border:`1px solid ${C.border}`,padding:"0.85rem 1.25rem",marginBottom:"1.25rem",display:"flex",gap:"2rem",flexWrap:"wrap",alignItems:"center"}}>
            <div style={{fontSize:"0.62rem",fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",minWidth:"70px"}}>Stock by DC</div>
            {[["Johannesburg",kpis.jhb],["Durban",kpis.dbn],["Cape Town",kpis.cpt]].map(([label,val])=>(
              <div key={label} style={{flex:1,minWidth:"140px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"0.25rem"}}>
                  <span style={{fontSize:"0.68rem",color:C.muted,fontWeight:600}}>{label}</span>
                  <span style={{fontSize:"0.85rem",fontWeight:800,color:C.text}}>{fmtR(val)}</span>
                </div>
                <div style={{height:"4px",background:"#EEF2F7",borderRadius:"2px",overflow:"hidden"}}>
                  <div style={{height:"100%",background:C.teal,width:`${kpis.stock_ty?(val/kpis.stock_ty*100):0}%`}}/>
                </div>
                <div style={{fontSize:"0.62rem",color:C.faint,marginTop:"0.2rem"}}>{kpis.stock_ty?(val/kpis.stock_ty*100).toFixed(0):0}% of total</div>
              </div>
            ))}
          </div>
        )}

        {/* Channel table */}
        {data.site&&(
          <div style={{background:C.card,borderRadius:"8px",border:`1px solid ${C.border}`,overflow:"hidden",marginBottom:"1.25rem"}}>
            <div style={{padding:"0.85rem 1.25rem",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:"0.62rem",fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em"}}>Performance by Channel</div>
              {(period==="mtd"||period==="ytd")&&<div style={{fontSize:"0.65rem",color:C.teal,fontWeight:600}}>{dates.length} trading days in period</div>}
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr style={{borderBottom:`1px solid ${C.border}`}}>
                  <TH label="Channel" align="left"/>
                  <TH label="Revenue TY"/><TH label="Revenue LY"/><TH label="vs LY"/>
                  <TH label="Orders TY"/><TH label="Orders LY"/><TH label="vs LY"/>
                </tr></thead>
                <tbody>
                  {kpis&&<CRow row={{site:"TOTAL",rev_ty:kpis.rev_ty,rev_ly:kpis.rev_ly,ord_ty:kpis.ord_ty,ord_ly:kpis.ord_ly}} variant="total"/>}
                  <tr><td colSpan={7} style={{padding:"0.28rem 1rem",background:"#EFF6FF",fontSize:"0.58rem",fontWeight:700,color:"#2563EB",textTransform:"uppercase",letterSpacing:"0.1em"}}>D2E — Employee Shops</td></tr>
                  {d2eRows.map(r=><CRow key={r.site} row={r}/>)}
                  {channels.d2eSub&&<CRow row={{site:"D2E Subtotal",...channels.d2eSub}} variant="sub"/>}
                  {d2cRows.length>0&&<>
                    <tr><td colSpan={7} style={{padding:"0.28rem 1rem",background:"#F0FDF4",fontSize:"0.58rem",fontWeight:700,color:"#16A34A",textTransform:"uppercase",letterSpacing:"0.1em"}}>D2C — Consumer (Grocery Club)</td></tr>
                    {d2cRows.map(r=><CRow key={r.site} row={r}/>)}
                    {channels.d2cSub&&<CRow row={{site:"D2C Subtotal",...channels.d2cSub}} variant="sub"/>}
                  </>}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* Items table */}
        {data.items&&(
          <div style={{background:C.card,borderRadius:"8px",border:`1px solid ${C.border}`,overflow:"hidden",marginBottom:"1.25rem"}}>
            <div style={{padding:"0.85rem 1.25rem",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:"0.62rem",fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em"}}>Top 100 Items</div>
                <div style={{fontSize:"0.68rem",color:C.faint,marginTop:"2px"}}>Click any metric column to sort</div>
              </div>
              <div style={{fontSize:"0.68rem",color:C.faint}}>{items.filter(r=>r.rev_ty>0).length} items active in period</div>
            </div>
            <div style={{overflowX:"auto"}}>
              <div style={{maxHeight:"520px",overflowY:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",tableLayout:"fixed"}}>
                  <colgroup>
                    <col style={{width:"30%"}}/><col style={{width:"9%"}}/>
                    <col style={{width:"10%"}}/><col style={{width:"10%"}}/><col style={{width:"9.5%"}}/>
                    <col style={{width:"9%"}}/><col style={{width:"9%"}}/><col style={{width:"9.5%"}}/>
                  </colgroup>
                  <thead style={{position:"sticky",top:0,zIndex:2}}>
                    <tr style={{borderBottom:`1px solid ${C.border}`}}>
                      <TH label="Product" align="left"/><TH label="Brand" align="left"/>
                      <TH label="Revenue TY" k="rev_ty"/><TH label="Revenue LY" k="rev_ly"/><TH label="Rev vs LY" k="rev_pct"/>
                      <TH label="Units TY" k="units_ty"/><TH label="Units LY" k="units_ly"/><TH label="Units vs LY" k="units_pct"/>
                    </tr>
                  </thead>
                  <tbody>
                    {items.map((item,i)=>(
                      <tr key={item.id} style={{background:i%2===0?C.stripe:C.card,borderBottom:`1px solid ${C.border}`}}>
                        <td style={{padding:"0.48rem 1rem",fontSize:"0.75rem",color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={item.name}>{item.name}</td>
                        <td style={{padding:"0.48rem 0.75rem",fontSize:"0.7rem",color:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.brand}</td>
                        <td style={{padding:"0.48rem 0.75rem",textAlign:"right",fontSize:"0.76rem",color:C.text,fontWeight:600}}>{fmtR(item.rev_ty)}</td>
                        <td style={{padding:"0.48rem 0.75rem",textAlign:"right",fontSize:"0.73rem",color:C.muted}}>{fmtR(item.rev_ly)}</td>
                        <td style={{padding:"0.48rem 0.75rem",textAlign:"right",fontSize:"0.76rem",fontWeight:700,color:pColor(item.rev_pct)}}>{fmtPct(item.rev_pct)}</td>
                        <td style={{padding:"0.48rem 0.75rem",textAlign:"right",fontSize:"0.76rem",color:C.text}}>{fmtN(item.units_ty)}</td>
                        <td style={{padding:"0.48rem 0.75rem",textAlign:"right",fontSize:"0.73rem",color:C.muted}}>{fmtN(item.units_ly)}</td>
                        <td style={{padding:"0.48rem 0.75rem",textAlign:"right",fontSize:"0.76rem",fontWeight:700,color:pColor(item.units_pct)}}>{fmtPct(item.units_pct)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}

        <div style={{padding:"0.7rem 1rem",background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:"8px",fontSize:"0.7rem",color:"#92400E"}}>
          <strong>Data notes:</strong> Units are top 100 SKUs only (~28.5% of total revenue). Stock is a warehouse value snapshot. All figures in ZAR vs same period last year.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
